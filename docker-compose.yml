services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crypto_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d crypto_bot"]
      interval: 10s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Overrides whatever DATABASE_URL is in .env so this compose file
      # works out of the box against the postgres service above. Remove
      # this line (and set DATABASE_URL in .env instead) if you're
      # pointing at an external/managed database instead.
      DATABASE_URL: postgresql+asyncpg://botuser:strongpassword@postgres:5432/crypto_bot
      PORT: "10000"
    ports:
      - "10000:10000"
    volumes:
      - ./models/weights:/app/models/weights
      - ./logs:/app/logs
      - runtime_data:/app/.runtime
    restart: unless-stopped

volumes:
  pgdata:
  runtime_data:
